# Builds the marketing homepage as a static demo and publishes it to GitHub
# Pages. This is for previews only (e.g. showing the client) — production runs
# on the VPS (see deploy.yml). No API, MinIO, or imgproxy: the site renders from
# the bundled demo assets in apps/web/public/demo via NEXT_PUBLIC_DEMO_MODE=1.
name: Demo (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static demo
        env:
          # Project Pages are served from /<repo>, so the demo must be built
          # with a matching basePath. Derived from the repo name automatically.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm --filter web build:demo

      - name: Disable Jekyll processing
        run: touch apps/web/out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
